<div class="card">
  <h3>Live Sound Detection</h3>
  <p><strong>Prediction:</strong> <span id="live-label">Waiting...</span></p>
  <p><strong>Confidence:</strong> <span id="live-score">-</span></p>
  <p><strong>Time:</strong> <span id="live-time">-</span></p>
</div>

<div class="card">
  <h3>Recent Alerts</h3>
  <ul id="alerts-list">
    {% for alert in alerts %}
      <li>{{ alert }}</li>
    {% endfor %}
  </ul>
</div>
