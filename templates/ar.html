<!DOCTYPE html>
<html>
<head>
  <title>PrioritySound Direction View</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      padding: 30px;
      border-radius: 16px;
      border: 2px solid #333;
      width: 320px;
    }

    #direction {
      font-size: 48px;
      margin: 20px 0;
    }

    .left { color: #00d4ff; }
    .right { color: #ff9a00; }
    .center { color: #00ff88; }

    #label {
      font-size: 18px;
      opacity: 0.8;
    }

    #priority {
      font-size: 22px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Sound Direction</h2>

    <div id="direction">Loading...</div>

    <div id="label"></div>
    <div id="priority"></div>
  </div>

<script>
async function update() {
  try {
    const res = await fetch("/direction_data");
    const data = await res.json();

    const dirBox = document.getElementById("direction");
    const labelBox = document.getElementById("label");
    const priorityBox = document.getElementById("priority");

    const dir = data.direction;

    dirBox.className = "";

    if (dir === "left") {
      dirBox.innerText = "⬅ LEFT";
      dirBox.classList.add("left");
    } 
    else if (dir === "right") {
      dirBox.innerText = "RIGHT ➡";
      dirBox.classList.add("right");
    } 
    else {
      dirBox.innerText = "⬆ CENTER";
      dirBox.classList.add("center");
    }

    labelBox.innerText = "Sound: " + data.label;
    priorityBox.innerText = "Priority: " + data.priority.toUpperCase();

  } catch (e) {
    console.log(e);
  }
}

setInterval(update, 1000);
update();
</script>

</body>
</html>
