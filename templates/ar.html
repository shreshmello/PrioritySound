<!DOCTYPE html>
<html>
<head>
    <title>PrioritySound AR Mode</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            font-family: Arial, sans-serif;
            color: white;
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .status {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            font-size: 18px;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div class="status">
    PrioritySound AR Active
</div>
<video id="camera" autoplay playsinline></video>
<canvas id="overlay"></canvas>
<script src="{{ url_for('static', filename='ar.js') }}"></script>
</body>
</html>
