{% extends "base.html" %}
{% block content %}

<div class="dashboard-shell">
  <div class="neon-bar"></div>

  <section class="hero-panel" style="margin-bottom: 24px;">
    <div>
      <p class="eyebrow">Augmented Reality</p>
      <h1>Sound Mapping</h1>
      <p class="hero-subtext">Live camera feed with real-time sound direction overlay.</p>
      <div class="hero-meta">
        <span class="status-pill"><span class="live-dot"></span> Live</span>
      </div>
    </div>
    <div class="hero-actions">
      <img src="{{ url_for('static', filename='PrioritySoundLogo.png') }}"
           alt="PrioritySound Logo" class="dashboard-logo">
    </div>
  </section>

  <!-- Camera + Canvas overlay -->
  <section class="card" style="margin-bottom: 24px;">
    <div class="section-head">
      <h3>Camera Feed</h3>
      <span class="muted" id="ar-label">Detecting...</span>
    </div>

    <div style="position:relative; width:100%; border-radius:16px; overflow:hidden; background:#000; aspect-ratio:16/9;">
      <video id="ar-video" autoplay playsinline muted
        style="width:100%; height:100%; display:block; object-fit:cover;"></video>
      <canvas id="ar-canvas"
        style="position:absolute; top:0; left:0; width:100%; height:100%;"></canvas>
    </div>
  </section>

  <!-- Direction pills -->
  <section class="card" style="margin-bottom: 24px;">
    <div class="section-head">
      <h3>Sound Direction</h3>
    </div>
    <div style="display:flex; justify-content:center; gap:24px; flex-wrap:wrap;">
      <div id="ar-left"   class="ar-pill">◀ Left</div>
      <div id="ar-center" class="ar-pill">● Center</div>
      <div id="ar-right"  class="ar-pill">Right ▶</div>
    </div>
  </section>

  <!-- Latest detection info -->
  <section class="card">
    <div class="section-head">
      <h3>Latest Detection</h3>
    </div>
    <div class="summary-stats">
      <div class="stat-box">
        <span class="stat-label">Sound</span>
        <strong id="ar-sound">--</strong>
      </div>
      <div class="stat-box">
        <span class="stat-label">Direction</span>
        <strong id="ar-direction">--</strong>
      </div>
      <div class="stat-box">
        <span class="stat-label">Priority</span>
        <strong id="ar-priority">--</strong>
      </div>
    </div>
  </section>
</div>

<style>
  .ar-pill {
    padding: 12px 32px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 1rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: #9aa4bd;
    transition: background 0.3s, color 0.3s, box-shadow 0.3s;
  }
  .ar-pill.active {
    background: rgba(110, 231, 183, 0.18);
    color: #6ee7b7;
    box-shadow: 0 0 20px rgba(110,231,183,0.3);
  }
  .ar-pill.active.emergency {
    background: rgba(248, 113, 113, 0.18);
    color: #f87171;
    box-shadow: 0 0 20px rgba(248,113,113,0.3);
  }
  .ar-pill.active.high {
    background: rgba(251, 146, 60, 0.18);
    color: #fb923c;
    box-shadow: 0 0 20px rgba(251,146,60,0.3);
  }
  .ar-pill.active.medium {
    background: rgba(252, 211, 77, 0.18);
    color: #fcd34d;
    box-shadow: 0 0 20px rgba(252,211,77,0.3);
  }
</style>

<script src="{{ url_for('static', filename='ar.js') }}"></script>

{% endblock %}
