<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PrioritySound AR View</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

/* Fullscreen AR overlay */
#ar-container {
  width: 100vw;
  height: 100vh;
  position: relative;
  background: radial-gradient(circle, #111, #000);
}

/* Center sound icon */
#sound-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 80px;
}

/* Arrow styling */
.arrow {
  position: absolute;
  font-size: 70px;
  opacity: 0;
  transition: all 0.3s ease;
}

/* positions */
#leftArrow { left: 10%; top: 50%; transform: translateY(-50%); }
#rightArrow { right: 10%; top: 50%; transform: translateY(-50%); }
#centerText { bottom: 10%; left: 50%; transform: translateX(-50%); font-size: 24px; }

/* priority colors */
.emergency { color: red; }
.high { color: orange; }
.medium { color: yellow; }
.low { color: blue; }
</style>
</head>

<body>

<div id="ar-container">

  <div id="sound-icon">🔊</div>

  <div id="leftArrow" class="arrow">⬅️</div>
  <div id="rightArrow" class="arrow">➡️</div>

  <div id="centerText">Waiting for sound...</div>

</div>

<script>
async function fetchDirection() {
  try {
    const res = await fetch("/direction_data");
    const data = await res.json();

    updateAR(data);

  } catch (err) {
    console.log("error:", err);
  }
}

function updateAR(data) {
  const left = document.getElementById("leftArrow");
  const right = document.getElementById("rightArrow");
  const text = document.getElementById("centerText");

  // reset visibility
  left.style.opacity = 0;
  right.style.opacity = 0;

  // show direction
  if (data.direction === "left") {
    left.style.opacity = 1;
  } 
  else if (data.direction === "right") {
    right.style.opacity = 1;
  }

  // center always shows label
  text.innerHTML = `
    <b>${data.label}</b> <br>
    Priority: <span class="${data.priority}">${data.priority}</span>
  `;
}

// update every second
setInterval(fetchDirection, 1000);
fetchDirection();
</script>

</body>
</html>
