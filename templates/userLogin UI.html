{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Login</h2>
    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button>Login</button>
    </form>
    <p>No account? <a href="/register">Register</a></p>
</div>
{% endblock %}
